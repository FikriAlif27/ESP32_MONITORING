<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOWIKENTUT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0a0c0f;
    --panel:       #0f1318;
    --border:      #1e2a1a;
    --accent:      #39ff14;
    --accent-dim:  #1a7a06;
    --amber:       #ffb300;
    --red:         #ff3b3b;
    --lcd-bg:      #0d1a0a;
    --lcd-pixel:   #39ff14;
    --lcd-dim:     #0f3a08;
    --lcd-off:     #071204;
    --text:        #a8c8a0;
    --text-dim:    #3a5a34;
    --mono:        'Share Tech Mono', monospace;
    --head:        'Orbitron', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(57,255,20,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57,255,20,0.012) 2px, rgba(57,255,20,0.012) 4px);
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon {
    width: 42px; height: 42px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 20px;
    box-shadow: 0 0 12px rgba(57,255,20,0.35), inset 0 0 8px rgba(57,255,20,0.1);
    flex-shrink: 0;
  }
  h1 {
    font-family: var(--head);
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(57,255,20,0.5);
    line-height: 1.2;
  }
  h1 span { display: block; color: var(--text-dim); font-size: 0.65em; letter-spacing: 0.08em; font-weight: 400; margin-top: 2px; }

  /* ── Status bar ── */
  .status-bar {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.connecting { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 1s infinite; }
  .dot.connected  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.error      { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #status-text { flex: 1; }
  #broker-host { margin-left: auto; color: var(--text-dim); font-size: 10px; }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--head);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LCD Display ── */
  .lcd-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }
  .lcd-outer {
    background: #1a2414;
    border: 3px solid #2a3a22;
    border-radius: 8px;
    padding: 18px 22px;
    box-shadow:
      0 0 0 1px #0d1a0a,
      0 8px 32px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .lcd-screen {
    background: var(--lcd-bg);
    border: 2px solid #0a1408;
    border-radius: 3px;
    padding: 12px 10px;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.6),
      inset 0 0 4px rgba(57,255,20,0.08),
      0 0 0 1px #0f1e0a;
    position: relative;
    overflow: hidden;
  }
  /* CRT scanline overlay */
  .lcd-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 2;
  }
  /* Reflection overlay */
  .lcd-screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
    pointer-events: none;
    z-index: 3;
  }
  .lcd-row {
    display: flex;
    gap: 3px;
    position: relative;
    z-index: 1;
  }
  .lcd-row + .lcd-row { margin-top: 8px; }
  .lcd-cell {
    width: 18px;
    height: 26px;
    background: var(--lcd-off);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--lcd-pixel);
    text-shadow: 0 0 6px var(--lcd-pixel), 0 0 10px rgba(57,255,20,0.4);
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }
  .lcd-cell.empty { color: var(--lcd-dim); background: var(--lcd-off); }
  .lcd-cell.cursor { background: var(--accent-dim); animation: cursor-blink 1s step-end infinite; }
  .lcd-cell.overflow { background: rgba(255,59,59,0.2); color: var(--red); text-shadow: 0 0 6px var(--red); }
  @keyframes cursor-blink { 0%,100%{background:var(--accent-dim)} 50%{background:var(--lcd-off)} }
  .lcd-label { display: flex; justify-content: space-between; margin-top: 10px; }
  .lcd-label span { font-size: 9px; letter-spacing: 0.1em; color: var(--text-dim); }

  /* ── Char counter ── */
  .char-counter {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 12px;
    font-size: 11px;
  }
  .char-counter .count { font-family: var(--head); font-size: 13px; color: var(--accent); }
  .char-counter .count.warn { color: var(--amber); }
  .char-counter .count.over { color: var(--red); }

  /* ── Message input ── */
  .input-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  textarea, input[type="text"], input[type="password"] {
    width: 100%;
    background: #070a07;
    border: 1px solid #1e2a1a;
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    resize: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus, input:focus {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 2px rgba(57,255,20,0.1);
  }
  textarea { height: 72px; }

  .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px) { .row-inputs { grid-template-columns: 1fr; } }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  button {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 12px 22px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #060c04;
    font-weight: 700;
    text-transform: uppercase;
    box-shadow: 0 0 16px rgba(57,255,20,0.3);
    flex: 1;
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 0 24px rgba(57,255,20,0.55); transform: translateY(-1px); }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-connect {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    padding: 10px 18px;
  }
  .btn-connect:hover { background: rgba(57,255,20,0.07); }
  .btn-connect.disconnect { border-color: var(--red); color: var(--red); }
  .btn-connect.disconnect:hover { background: rgba(255,59,59,0.07); }

  /* ── Log ── */
  .log-box {
    background: #070a07;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    height: 120px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.7;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: transparent; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry { display: flex; gap: 8px; }
  .log-entry .ts { color: var(--text-dim); flex-shrink: 0; }
  .log-entry.ok .msg { color: var(--accent); }
  .log-entry.warn .msg { color: var(--amber); }
  .log-entry.err .msg { color: var(--red); }
  .log-entry.info .msg { color: var(--text); }

  /* ── Send flash ── */
  .send-flash {
    position: fixed;
    inset: 0;
    background: rgba(57,255,20,0.06);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
    z-index: 999;
  }
  .send-flash.active { opacity: 1; }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="send-flash" id="flash"></div>

<header>
  <div class="logo-icon">📡</div>
  <div>
    <h1>FIKRI ALIF PROJEKX<span>MQTT WebSocket Controller · HiveMQ Cloud</span></h1>
  </div>
</header>

<!-- Status -->
<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Belum terhubung</span>
  <span id="broker-host">—</span>
</div>

<!-- LCD Preview -->
<div class="card">
  <div class="card-title">Simulasi LCD 16×2</div>
  <div class="lcd-wrapper">
    <div class="lcd-outer">
      <div class="lcd-screen">
        <div class="lcd-row" id="row1"></div>
        <div class="lcd-row" id="row2"></div>
      </div>
      <div class="lcd-label">
        <span>BARIS 1 (1–16)</span>
        <span>BARIS 2 (17–32)</span>
      </div>
    </div>
  </div>
  <div class="char-counter">
    <span>Karakter:</span>
    <span class="count" id="char-count">0</span>
    <span>/ 32</span>
  </div>
</div>

<!-- Message Input -->
<div class="card">
  <div class="card-title">Pesan</div>
  <div class="input-group">
    <label>Ketik pesan (max 32 karakter, otomatis wrap ke baris 2)</label>
    <textarea id="msg-input" maxlength="32" placeholder="Tulis pesan di sini…"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn-primary" id="send-btn" disabled>▶ KIRIM PESAN</button>
    <button class="btn-secondary" id="clear-btn">✕ HAPUS</button>
  </div>
</div>

<!-- MQTT Config -->
<div class="card">
  <div class="card-title">Konfigurasi MQTT</div>
  <div class="row-inputs" style="margin-bottom:14px">
    <div class="input-group" style="margin:0">
      <label>Host (HiveMQ Cloud)</label>
      <input type="text" id="cfg-host" placeholder="xxxx.hivemq.cloud">
    </div>
    <div class="input-group" style="margin:0">
      <label>Port (WSS)</label>
      <input type="text" id="cfg-port" value="8884">
    </div>
  </div>
  <div class="row-inputs" style="margin-bottom:14px">
    <div class="input-group" style="margin:0">
      <label>Username</label>
      <input type="text" id="cfg-user" placeholder="mqtt-username">
    </div>
    <div class="input-group" style="margin:0">
      <label>Password</label>
      <input type="password" id="cfg-pass" placeholder="••••••••">
    </div>
  </div>
  <div class="input-group" style="margin-bottom:18px">
    <label>Topic Publish</label>
    <input type="text" id="cfg-topic" value="esp32/lcd/message">
  </div>
  <div class="btn-row">
    <button class="btn-connect" id="connect-btn" onclick="toggleConnect()">⚡ HUBUNGKAN</button>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-title">Activity Log</div>
  <div class="log-box" id="log-box">
    <div class="log-entry info"><span class="ts">[--:--:--]</span><span class="msg">Sistem siap. Isi konfigurasi MQTT lalu klik Hubungkan.</span></div>
  </div>
</div>

<script>
  // ── State ──
  let client = null;
  let isConnected = false;

  // ── LCD Render ──
  const COLS = 16;
  function buildLcd() {
    ['row1','row2'].forEach(id => {
      const row = document.getElementById(id);
      row.innerHTML = '';
      for (let i = 0; i < COLS; i++) {
        const cell = document.createElement('div');
        cell.className = 'lcd-cell empty';
        cell.id = id + '-' + i;
        cell.textContent = ' ';
        row.appendChild(cell);
      }
    });
  }

  function updateLcd(text) {
    const padded = (text + ' '.repeat(32)).substring(0, 32);
    const line1 = padded.substring(0, 16);
    const line2 = padded.substring(16, 32);
    const origLen = text.length;

    [line1, line2].forEach((line, rowIdx) => {
      const rowId = rowIdx === 0 ? 'row1' : 'row2';
      for (let i = 0; i < 16; i++) {
        const cell = document.getElementById(rowId + '-' + i);
        const globalIdx = rowIdx * 16 + i;
        const ch = line[i];
        const isBlank = globalIdx >= origLen;
        const isOver = globalIdx >= 32 && globalIdx < origLen;

        if (isOver) {
          cell.className = 'lcd-cell overflow';
          cell.textContent = ch || ' ';
        } else if (isBlank) {
          cell.className = 'lcd-cell empty';
          cell.textContent = ' ';
        } else {
          cell.className = 'lcd-cell';
          cell.textContent = ch === ' ' ? '\u00a0' : ch;
        }
      }
    });

    // Char counter
    const counter = document.getElementById('char-count');
    counter.textContent = Math.min(origLen, 32);
    counter.className = 'count' + (origLen > 32 ? ' over' : origLen > 24 ? ' warn' : '');
  }

  // ── Input ──
  document.getElementById('msg-input').addEventListener('input', function() {
    if (this.value.length > 32) this.value = this.value.substring(0, 32);
    updateLcd(this.value);
  });
  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('msg-input').value = '';
    updateLcd('');
  });

  // ── Log ──
  function log(msg, type = 'info') {
    const box = document.getElementById('log-box');
    const now = new Date();
    const ts = now.toTimeString().substring(0,8);
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + type;
    entry.innerHTML = `<span class="ts">[${ts}]</span><span class="msg">${msg}</span>`;
    box.appendChild(entry);
    box.scrollTop = box.scrollHeight;
  }

  // ── Status ──
  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    dot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  // ── MQTT ──
  function toggleConnect() {
    if (isConnected || client) {
      disconnect();
    } else {
      connect();
    }
  }

  function connect() {
    const host  = document.getElementById('cfg-host').value.trim();
    const port  = parseInt(document.getElementById('cfg-port').value.trim()) || 8884;
    const user  = document.getElementById('cfg-user').value.trim();
    const pass  = document.getElementById('cfg-pass').value;
    const topic = document.getElementById('cfg-topic').value.trim();

    if (!host) { log('Host MQTT tidak boleh kosong!', 'err'); return; }

    const url = `wss://${host}:${port}/mqtt`;
    document.getElementById('broker-host').textContent = `${host}:${port}`;

    setStatus('connecting', 'Menghubungkan…');
    log(`Mencoba koneksi ke ${url}`, 'warn');

    const opts = {
      clientId: 'lcd-sender-' + Math.random().toString(16).substring(2,8),
      clean: true,
      reconnectPeriod: 0,
    };
    if (user) { opts.username = user; opts.password = pass; }

    try {
      client = mqtt.connect(url, opts);
    } catch(e) {
      log('Gagal inisialisasi MQTT: ' + e.message, 'err');
      setStatus('error', 'Error');
      return;
    }

    client.on('connect', () => {
      isConnected = true;
      setStatus('connected', 'Terhubung ke broker');
      log('✓ Terhubung ke ' + host, 'ok');
      document.getElementById('send-btn').disabled = false;
      const btn = document.getElementById('connect-btn');
      btn.textContent = '✕ PUTUSKAN';
      btn.className = 'btn-connect disconnect';
    });

    client.on('error', (err) => {
      setStatus('error', 'Error koneksi');
      log('Error: ' + (err.message || err), 'err');
      document.getElementById('send-btn').disabled = true;
    });

    client.on('close', () => {
      if (isConnected) {
        isConnected = false;
        setStatus('', 'Koneksi terputus');
        log('Koneksi ditutup.', 'warn');
        document.getElementById('send-btn').disabled = true;
        const btn = document.getElementById('connect-btn');
        btn.textContent = '⚡ HUBUNGKAN';
        btn.className = 'btn-connect';
        document.getElementById('broker-host').textContent = '—';
      }
    });

    client.on('offline', () => {
      setStatus('error', 'Offline');
      log('Client offline.', 'warn');
    });
  }

  function disconnect() {
    if (client) {
      client.end(true);
      client = null;
      isConnected = false;
      setStatus('', 'Terputus');
      document.getElementById('send-btn').disabled = true;
      const btn = document.getElementById('connect-btn');
      btn.textContent = '⚡ HUBUNGKAN';
      btn.className = 'btn-connect';
      document.getElementById('broker-host').textContent = '—';
      log('Koneksi diputus manual.', 'info');
    }
  }

  // ── Send ──
  document.getElementById('send-btn').addEventListener('click', () => {
    if (!isConnected || !client) { log('Belum terhubung ke broker.', 'err'); return; }

    const rawText = document.getElementById('msg-input').value;
    const text = rawText.substring(0, 32);
    const line1 = text.substring(0, 16).padEnd(16, ' ');
    const line2 = text.substring(16, 32).padEnd(16, ' ');
    const topic = document.getElementById('cfg-topic').value.trim();
    const payload = JSON.stringify({ line1: line1.trimEnd(), line2: line2.trimEnd() });

    client.publish(topic, payload, { qos: 1 }, (err) => {
      if (err) {
        log('Gagal kirim: ' + err.message, 'err');
      } else {
        log(`✓ Pesan terkirim → ${topic}`, 'ok');
        log(`  Payload: ${payload}`, 'info');
        flashScreen();
      }
    });
  });

  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.add('active');
    setTimeout(() => f.classList.remove('active'), 150);
  }

  // ── Init ──
  buildLcd();
  updateLcd('');
</script>
</body>
</html>
